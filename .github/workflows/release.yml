name: Release Windows Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Verify tag matches pubspec.yaml version
        shell: bash
        run: scripts/verify_release_version.sh "${{ github.ref_name }}"

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = (Invoke-RestMethod "https://vulkan.lunarg.com/sdk/latest/windows.json").windows
          echo "Vulkan SDK version: $ver"
          curl.exe -o "$env:RUNNER_TEMP/VulkanSDK-Installer.exe" -L `
            "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkan_sdk.exe"
          & "$env:RUNNER_TEMP/VulkanSDK-Installer.exe" --accept-licenses `
            --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\$ver"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\$ver\bin"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build TTS DLL
        shell: cmd
        run: scripts\build_tts_windows.bat

      - name: Build LAME MP3 encoder DLL
        shell: cmd
        run: scripts\build_lame_windows.bat

      - name: Build Piper TTS DLL
        shell: cmd
        run: scripts\build_piper_windows.bat

      - name: Verify Piper DLLs exist
        shell: pwsh
        run: |
          $runner = "build/windows/x64/runner/Release"
          if (!(Test-Path "$runner/piper_tts_ffi.dll")) { throw "piper_tts_ffi.dll not found in $runner" }
          if (!(Test-Path "$runner/onnxruntime.dll")) { throw "onnxruntime.dll not found in $runner" }

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows release
        run: flutter build windows --release

      - name: Copy LAME LGPL license to release
        shell: pwsh
        run: |
          Copy-Item third_party/lame/COPYING build/windows/x64/runner/Release/LAME_LICENSE_LGPL.txt

      - name: Copy Piper and ONNX Runtime licenses to release
        shell: pwsh
        run: |
          Copy-Item third_party/piper-plus/LICENSE.md build/windows/x64/runner/Release/PIPER_LICENSE_MIT.txt
          $ortRoot = Get-ChildItem third_party/piper-plus/build/onnxruntime -Directory |
            Where-Object { $_.Name -like 'onnxruntime-win-*' } |
            Select-Object -First 1
          if (!$ortRoot) { throw "ONNX Runtime directory not found" }
          $ortLicense = Join-Path $ortRoot.FullName "LICENSE"
          if (!(Test-Path $ortLicense)) { throw "ONNX Runtime LICENSE not found at $ortLicense" }
          Copy-Item $ortLicense build/windows/x64/runner/Release/ONNXRUNTIME_LICENSE_MIT.txt

      - name: Guard against packaging runtime user-data
        shell: pwsh
        run: |
          # The app creates these paths at runtime in the exe directory.
          # None of them should appear in a clean CI build; their presence
          # means the runner state is dirty or the build pipeline regressed.
          $root = "build\windows\x64\runner\Release"
          $userPaths = @(
            "$root\NovelViewer",
            "$root\models",
            "$root\voices",
            "$root\novel_metadata.db"
          )
          foreach ($p in $userPaths) {
            if (Test-Path -LiteralPath $p) {
              throw "$p exists; this is runtime user-data and must not be packaged. Fail to avoid leaking developer data into release artifacts."
            }
          }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "novel_viewer-windows-x64-${tag}.zip"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          # Belt-and-braces: the ISS file uses `skipifsourcedoesntexist` on
          # the license glob so it stays usable locally without setting up
          # licenses, so CI asserts their presence here loudly instead.
          $root = "build\windows\x64\runner\Release"
          $requiredLicenses = @(
            "$root\LAME_LICENSE_LGPL.txt",
            "$root\PIPER_LICENSE_MIT.txt",
            "$root\ONNXRUNTIME_LICENSE_MIT.txt"
          )
          foreach ($lic in $requiredLicenses) {
            if (!(Test-Path -LiteralPath $lic)) { throw "Required license missing: $lic" }
          }
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          & ISCC.exe "installer\novel_viewer.iss" "/DAppVersion=$version"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed with exit code $LASTEXITCODE" }
          $exePath = "novel_viewer-setup-${tag}.exe"
          if (!(Test-Path -LiteralPath $exePath)) { throw "Installer EXE not found at $exePath" }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $targets = @(
            "novel_viewer-windows-x64-${tag}.zip",
            "novel_viewer-setup-${tag}.exe"
          )
          foreach ($file in $targets) {
            if (!(Test-Path -LiteralPath $file)) { throw "Target not found for SHA256: $file" }
            $hash = (Get-FileHash -LiteralPath $file -Algorithm SHA256).Hash.ToLower()
            # Write with LF endings (no CRLF, no BOM) so `sha256sum -c` on
            # Linux/macOS verifies correctly.
            $sidecar = Join-Path $PWD ("$file.sha256")
            [System.IO.File]::WriteAllText($sidecar, "$hash  $file`n", [System.Text.UTF8Encoding]::new($false))
          }

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            novel_viewer-setup-v*.exe
            novel_viewer-setup-v*.exe.sha256
            novel_viewer-windows-x64-v*.zip
            novel_viewer-windows-x64-v*.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
